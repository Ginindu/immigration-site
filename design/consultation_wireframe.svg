<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1800" width="1440" height="1800" style="background:#F9FAFB;">
  

  <!-- HEADER -->
  <g id="Header">
    <rect x="0" y="0" width="1440" height="90" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="100" y="52" font-size="24">Apex-Trust-Ardent</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="520" y="51" font-size="15">Home</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="585" y="51" font-size="15">About</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="650" y="51" font-size="15">Services [Dropdown]</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="815" y="51" font-size="15" font-weight="600">Consultation</text>
    <line x1="815" y1="62" x2="905" y2="62" stroke="#6B7280" stroke-width="2" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="925" y="51" font-size="15">Career</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="995" y="51" font-size="15">Contact</text>
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="1080" y="27" width="36" height="36" rx="18" />
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="1130" y="27" width="36" height="36" rx="6" />
    <rect fill="#9CA3AF" rx="20" x="1180" y="25" width="160" height="40" rx="20" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="1225" y="49" font-size="14">Get A Quote</text>
  </g>

  <!-- PAGE HEADER BANNER -->
  <g id="Page-Header">
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="0" y="90" width="1440" height="250" />
    <line x1="0" y1="90" x2="1440" y2="340" stroke="#D1D5DB" stroke-width="1" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="720" y="210" font-size="36" text-anchor="middle" fill="#1F2937">Book Consultation</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="720" y="250" font-size="14" text-anchor="middle">Home / Book Consultation</text>
  </g>

  <!-- BOOKING CONTENT -->
  <g id="Booking-Form">
    <!-- Left Column: Details -->
    <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="100" y="390" width="790" height="1060" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="140" y="445" font-size="24">Book An Appointment</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="140" y="480" font-size="15">Schedule a personalized consultation session with one of our certified counselors.</text>

    <!-- Steps Indicator -->
    <circle cx="160" cy="540" r="16" fill="#4B5563" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="160" y="545" font-size="13" text-anchor="middle">1</text>
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="190" y="546" font-size="14">Personal Info</text>
    <line x1="280" y1="540" x2="380" y2="540" stroke="#D1D5DB" stroke-width="2" />

    <circle cx="410" cy="540" r="16" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="410" y="545" font-size="13" text-anchor="middle" font-weight="bold">2</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="440" y="546" font-size="14">Visa Program</text>
    <line x1="535" y1="540" x2="635" y2="540" stroke="#D1D5DB" stroke-width="2" />

    <circle cx="665" cy="540" r="16" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="665" y="545" font-size="13" text-anchor="middle" font-weight="bold">3</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="695" y="546" font-size="14">Calendar</text>

    <!-- Inputs -->
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="140" y="620" font-size="16">Your Contact Information</text>
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="140" y="640" width="340" height="42" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="155" y="665" font-size="13">First Name</text>

    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="510" y="640" width="340" height="42" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="525" y="665" font-size="13">Last Name</text>

    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="140" y="700" width="340" height="42" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="155" y="725" font-size="13">Email</text>

    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="510" y="700" width="340" height="42" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="525" y="725" font-size="13">Phone Number</text>

    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="140" y="785" font-size="16">Immigration Details</text>
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="140" y="805" width="710" height="42" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="155" y="830" font-size="13">Select Program Interest (Canada, Australia, Legal etc.)</text>

    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="140" y="885" font-size="16">Preferred Schedule</text>
    <!-- Calendar Grid Mock -->
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="140" y="905" width="710" height="400" rx="8" />
    <line x1="140" y1="950" x2="850" y2="950" stroke="#D1D5DB" stroke-width="1.5" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="495" y="932" font-size="16" text-anchor="middle">June 2026</text>
    <!-- Week headers -->
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="190" y="980" font-size="13" text-anchor="middle">Mon</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="290" y="980" font-size="13" text-anchor="middle">Tue</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="390" y="980" font-size="13" text-anchor="middle">Wed</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="490" y="980" font-size="13" text-anchor="middle">Thu</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="590" y="980" font-size="13" text-anchor="middle">Fri</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="690" y="980" font-size="13" text-anchor="middle">Sat</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="790" y="980" font-size="13" text-anchor="middle">Sun</text>
    <!-- Grid items placeholder -->
    <line x1="140" y1="995" x2="850" y2="1305" stroke="#D1D5DB" stroke-width="0.5" stroke-dasharray="4 4" />

    <rect fill="#9CA3AF" rx="20" x="140" y="1340" width="200" height="48" rx="24" fill="#3B82F6" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="240" y="1369" font-size="14" text-anchor="middle">Confirm Booking</text>

    <!-- Right Sidebar Info -->
    <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="920" y="390" width="420" height="450" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="950" y="440" font-size="20">Booking Details</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="950" y="475" font-size="14">Review your consultation info here.</text>
    <line x1="950" y1="510" x2="1310" y2="510" stroke="#E5E7EB" stroke-width="1.5" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="950" y="550" font-size="15">Consultant Assigned</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="950" y="575" font-size="13">Assigned automatically based on service selection.</text>

    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="950" y="630" font-size="15">Consultation Fee</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="950" y="655" font-size="13">Initial Assessment: Free / Legal reviews vary.</text>
  </g>

  <!-- FOOTER -->
  <g id="Footer">
    <rect x="0" y="1580" width="1440" height="220" fill="#374151" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="100" y="1630" font-size="18">Your global journey starts here.</text>
    <line x1="100" y1="1660" x2="1340" y2="1660" stroke="#4B5563" stroke-width="1" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="100" y="1710" font-size="13" fill="#9CA3AF">© 2026 Apex-Trust-Ardent Immigration. All rights reserved.</text>
    <rect fill="#9CA3AF" rx="20" x="1230" y="1600" width="45" height="45" rx="5" fill="#4B5563" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="1248" y="1627" font-size="12">T</text>
    <rect fill="#9CA3AF" rx="20" x="1295" y="1600" width="45" height="45" rx="5" fill="#6B7280" />
    <path d="M1310 1628 l7 -7 l7 7" stroke="#FFFFFF" stroke-width="3" fill="none" />
  </g>
</svg>

