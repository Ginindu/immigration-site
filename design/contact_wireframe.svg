<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1800" width="1440" height="1800" style="background:#F9FAFB;">
  

  <!-- HEADER -->
  <g id="Header">
    <rect x="0" y="0" width="1440" height="90" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="100" y="52" font-size="24">Apex-Trust-Ardent</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="520" y="51" font-size="15">Home</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="585" y="51" font-size="15">About</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="650" y="51" font-size="15">Services [Dropdown]</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="815" y="51" font-size="15">Consultation</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="925" y="51" font-size="15">Career</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="995" y="51" font-size="15" font-weight="600">Contact</text>
    <line x1="995" y1="62" x2="1055" y2="62" stroke="#6B7280" stroke-width="2" />
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="1080" y="27" width="36" height="36" rx="18" />
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="1130" y="27" width="36" height="36" rx="6" />
    <rect fill="#9CA3AF" rx="20" x="1180" y="25" width="160" height="40" rx="20" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="1225" y="49" font-size="14">Get A Quote</text>
  </g>

  <!-- PAGE HEADER BANNER -->
  <g id="Page-Header">
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="0" y="90" width="1440" height="250" />
    <line x1="0" y1="90" x2="1440" y2="340" stroke="#D1D5DB" stroke-width="1" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="720" y="210" font-size="36" text-anchor="middle" fill="#1F2937">Contact Us</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="720" y="250" font-size="14" text-anchor="middle">Home / Contact Us</text>
  </g>

  <!-- CONTACT FORM & INFO -->
  <g id="Contact-Body">
    <!-- Left Column: Details -->
    <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="100" y="390" width="490" height="500" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="140" y="450" font-size="22">Get in Touch</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="140" y="485" font-size="14">Feel free to contact us with any inquiries.</text>

    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="140" y="550" font-size="16">General Support</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="140" y="575" font-size="14">Phone: +94 11 123 4567</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="140" y="600" font-size="14">Email: info@apextrustardent.lk</text>

    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="140" y="660" font-size="16">Working Hours</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="140" y="685" font-size="14">Mon - Fri: 8:30 AM - 5:30 PM</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="140" y="710" font-size="14">Saturday: 9:00 AM - 1:00 PM</text>

    <!-- Right Column: Form -->
    <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="620" y="390" width="720" height="500" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="650" y="450" font-size="22">Send Us A Message</text>
    
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="650" y="490" width="310" height="42" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="665" y="515" font-size="13">Name</text>

    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="990" y="490" width="320" height="42" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="1005" y="515" font-size="13">Email</text>

    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="650" y="550" width="660" height="42" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="665" y="575" font-size="13">Subject</text>

    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="650" y="610" width="660" height="150" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="665" y="635" font-size="13">Write your message details...</text>

    <rect fill="#9CA3AF" rx="20" x="650" y="780" width="180" height="45" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="740" y="808" font-size="13" text-anchor="middle">Send Message</text>
  </g>

  <!-- MAPS & OFFICES -->
  <g id="Worldwide-Offices">
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="100" y="970" font-size="24">Worldwide Offices</text>
    
    <!-- Office 1 -->
    <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="100" y="1010" width="390" height="280" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="120" y="1050" font-size="16">Colombo (Head Office)</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="120" y="1080" font-size="13">123 Ocean Avenue, Kollupitiya</text>
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="120" y="1120" width="350" height="150" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="295" y="1200" font-size="11" text-anchor="middle">[ Map Embed ]</text>

    <!-- Office 2 -->
    <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="525" y="1010" width="390" height="280" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="545" y="1050" font-size="16">Atlantic Canada</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="545" y="1080" font-size="13">Atlantic Provinces, Canada</text>
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="525" y="1120" width="350" height="150" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="700" y="1200" font-size="11" text-anchor="middle">[ Map Embed ]</text>

    <!-- Office 3 -->
    <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="950" y="1010" width="390" height="280" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="970" y="1050" font-size="16">Galle Branch</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="970" y="1080" font-size="13">22 Sea Street, Galle, Sri Lanka</text>
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="950" y="1120" width="350" height="150" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="1125" y="1200" font-size="11" text-anchor="middle">[ Map Embed ]</text>
  </g>

  <!-- FOOTER -->
  <g id="Footer">
    <rect x="0" y="1580" width="1440" height="220" fill="#374151" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="100" y="1630" font-size="18">Your global journey starts here.</text>
    <line x1="100" y1="1660" x2="1340" y2="1660" stroke="#4B5563" stroke-width="1" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="100" y="1710" font-size="13" fill="#9CA3AF">© 2026 Apex-Trust-Ardent Immigration. All rights reserved.</text>
    <rect fill="#9CA3AF" rx="20" x="1230" y="1600" width="45" height="45" rx="5" fill="#4B5563" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="1248" y="1627" font-size="12">T</text>
    <rect fill="#9CA3AF" rx="20" x="1295" y="1600" width="45" height="45" rx="5" fill="#6B7280" />
    <path d="M1310 1628 l7 -7 l7 7" stroke="#FFFFFF" stroke-width="3" fill="none" />
  </g>
</svg>

