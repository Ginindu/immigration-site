<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1800" width="1440" height="1800" style="background:#F9FAFB;">
  

  <!-- HEADER -->
  <g id="Header">
    <rect x="0" y="0" width="1440" height="90" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="100" y="52" font-size="24">Apex-Trust-Ardent</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="520" y="51" font-size="15">Home</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="585" y="51" font-size="15">About</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="650" y="51" font-size="15" font-weight="600">Services [Dropdown]</text>
    <line x1="650" y1="62" x2="800" y2="62" stroke="#6B7280" stroke-width="2" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="815" y="51" font-size="15">Consultation</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="925" y="51" font-size="15">Career</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="995" y="51" font-size="15">Contact</text>
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="1080" y="27" width="36" height="36" rx="18" />
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="1130" y="27" width="36" height="36" rx="6" />
    <rect fill="#9CA3AF" rx="20" x="1180" y="25" width="160" height="40" rx="20" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="1225" y="49" font-size="14">Get A Quote</text>
  </g>

  <!-- PAGE HEADER BANNER -->
  <g id="Page-Header">
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="0" y="90" width="1440" height="250" />
    <line x1="0" y1="90" x2="1440" y2="340" stroke="#D1D5DB" stroke-width="1" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="720" y="210" font-size="36" text-anchor="middle" fill="#1F2937">Global Immigration</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="720" y="250" font-size="14" text-anchor="middle">Home / Services / Other Countries</text>
  </g>

  <!-- DESTINATIONS GRID -->
  <g id="Global-Destinations">
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="100" y="390" font-size="24">Other Countries We Support</text>
    
    <!-- Australia Card -->
    <g name="Australia Card">
      <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="100" y="420" width="390" height="220" />
      <line x1="100" y1="420" x2="490" y2="640" stroke="#D1D5DB" stroke-width="1" />
      <line x1="100" y1="640" x2="490" y2="420" stroke="#D1D5DB" stroke-width="1" />
      <rect x="200" y="510" width="190" height="40" fill="#4B5563" rx="6" />
      <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="295" y="534" font-size="16" text-anchor="middle">Australia</text>
    </g>

    <!-- UK Card -->
    <g name="UK Card">
      <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="525" y="420" width="390" height="220" />
      <line x1="525" y1="420" x2="915" y2="640" stroke="#D1D5DB" stroke-width="1" />
      <line x1="525" y1="640" x2="915" y2="420" stroke="#D1D5DB" stroke-width="1" />
      <rect x="625" y="510" width="190" height="40" fill="#4B5563" rx="6" />
      <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="720" y="534" font-size="16" text-anchor="middle">United Kingdom</text>
    </g>

    <!-- USA Card -->
    <g name="USA Card">
      <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="950" y="420" width="390" height="220" />
      <line x1="950" y1="420" x2="1340" y2="640" stroke="#D1D5DB" stroke-width="1" />
      <line x1="950" y1="640" x2="1340" y2="420" stroke="#D1D5DB" stroke-width="1" />
      <rect x="1050" y="510" width="190" height="40" fill="#4B5563" rx="6" />
      <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="1145" y="534" font-size="16" text-anchor="middle">United States</text>
    </g>
  </g>

  <!-- DETAILED DESCRIPTIONS & PREPARATION -->
  <g id="Preparation-Services">
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="100" y="700" font-size="24">Language Proficiency Preparation</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="100" y="735" font-size="15">We offer specialized coaching classes to help you qualify for academic and relocation thresholds.</text>

    <!-- IELTS Card -->
    <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="100" y="770" width="580" height="150" />
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="120" y="795" width="100" height="100" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="240" y="825" font-size="18">IELTS Preparation</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="240" y="855" font-size="13">Structured academic/general training modules led by experienced</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="240" y="875" font-size="13">instructors. Focused on score improvement.</text>

    <!-- PTE/TOEFL Card -->
    <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="720" y="770" width="620" height="150" />
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="740" y="795" width="100" height="100" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="860" y="825" font-size="18">PTE / TOEFL Classes</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="860" y="855" font-size="13">Computer-based assessment practice, strategies, and mockup exams</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="860" y="875" font-size="13">simulated under standard test conditions.</text>
  </g>

  <!-- FAQS -->
  <g id="Global-FAQs">
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="100" y="990" font-size="24">Frequently Asked Questions</text>
    
    <!-- FAQ 1 -->
    <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="100" y="1030" width="1240" height="50" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="130" y="1062" font-size="15">What are the language test score requirements for Australian study visas?</text>
    <path d="M1300 1050 l6 6 l6 -6" stroke="#4B5563" stroke-width="2" fill="none" />
    
    <!-- FAQ 2 -->
    <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="100" y="1095" width="1240" height="50" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="130" y="1127" font-size="15">Can I work part-time on a student visa in the UK?</text>
    <path d="M1300 1110 l6 6 l6 -6" stroke="#4B5563" stroke-width="2" fill="none" />
  </g>

  <!-- FOOTER -->
  <g id="Footer">
    <rect x="0" y="1580" width="1440" height="220" fill="#374151" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="100" y="1630" font-size="18">Your global journey starts here.</text>
    <line x1="100" y1="1660" x2="1340" y2="1660" stroke="#4B5563" stroke-width="1" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="100" y="1710" font-size="13" fill="#9CA3AF">© 2026 Apex-Trust-Ardent Immigration. All rights reserved.</text>
    <rect fill="#9CA3AF" rx="20" x="1230" y="1600" width="45" height="45" rx="5" fill="#4B5563" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="1248" y="1627" font-size="12">T</text>
    <rect fill="#9CA3AF" rx="20" x="1295" y="1600" width="45" height="45" rx="5" fill="#6B7280" />
    <path d="M1310 1628 l7 -7 l7 7" stroke="#FFFFFF" stroke-width="3" fill="none" />
  </g>
</svg>

