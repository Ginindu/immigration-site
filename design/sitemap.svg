<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="100%" height="100%">
  <!-- Definition of filters, gradients, markers -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1329" />
      <stop offset="100%" stop-color="#152238" />
    </linearGradient>

    <!-- Node Gradients -->
    <linearGradient id="home-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Drop Shadows and Glows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <!-- Markers -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#3B82F6" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#A855F7" />
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#14B8A6" />
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#10B981" />
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#F59E0B" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; fill: #FFFFFF; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; fill: #94A3B8; }
    .url { font-family: 'Courier New', monospace; font-size: 11px; fill: #64748B; }
    .home-url { font-family: 'Courier New', monospace; font-size: 11px; fill: #E0E7FF; }
    .connection-line { fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .node-rect { stroke-width: 1.5; }
    .label { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 13px; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <!-- Grid lines for visual depth -->
  <g opacity="0.03">
    <path d="M 0 50 L 1200 50 M 0 100 L 1200 100 M 0 150 L 1200 150 M 0 200 L 1200 200 M 0 250 L 1200 250 M 0 300 L 1200 300 M 0 350 L 1200 350 M 0 400 L 1200 400 M 0 450 L 1200 450 M 0 500 L 1200 500 M 0 550 L 1200 550" stroke="#FFFFFF" stroke-width="1"/>
    <path d="M 100 0 L 100 620 M 200 0 L 200 620 M 300 0 L 300 620 M 400 0 L 400 620 M 500 0 L 500 620 M 600 0 L 600 620 M 700 0 L 700 620 M 800 0 L 800 620 M 900 0 L 900 620 M 1000 0 L 1000 620 M 1100 0 L 1100 620" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <!-- Title of Sitemap -->
  <text x="50" y="45" class="title" font-size="22" fill="#FFFFFF">Immigration Site Map</text>
  <text x="50" y="65" class="subtitle" font-size="12">Interactive Page Hierarchy &amp; Navigation Flow</text>

  <!-- ==================== CONNECTORS ==================== -->
  <!-- Main Backbone from Home Page -->
  <path d="M 600 120 L 600 170" class="connection-line" stroke="#3B82F6" />
  <path d="M 140 170 L 1060 170" class="connection-line" stroke="#475569" />

  <!-- Drops to Level 1 Nodes -->
  <path d="M 140 170 L 140 214" class="connection-line" stroke="#3B82F6" marker-end="url(#arrow-blue)" />
  <path d="M 370 170 L 370 214" class="connection-line" stroke="#A855F7" marker-end="url(#arrow-purple)" />
  <path d="M 600 170 L 600 214" class="connection-line" stroke="#14B8A6" marker-end="url(#arrow-teal)" />
  <path d="M 830 170 L 830 214" class="connection-line" stroke="#10B981" marker-end="url(#arrow-emerald)" />
  <path d="M 1060 170 L 1060 214" class="connection-line" stroke="#F59E0B" marker-end="url(#arrow-amber)" />

  <!-- Services Sub-Backbone -->
  <path d="M 370 280 L 370 300" class="connection-line" stroke="#A855F7" />
  <path d="M 370 300 L 250 300" class="connection-line" stroke="#A855F7" />
  <path d="M 250 300 L 250 517.5" class="connection-line" stroke="#A855F7" />

  <!-- Services Sub-Branches -->
  <path d="M 250 357.5 L 274 357.5" class="connection-line" stroke="#A855F7" marker-end="url(#arrow-purple)" />
  <path d="M 250 437.5 L 274 437.5" class="connection-line" stroke="#A855F7" marker-end="url(#arrow-purple)" />
  <path d="M 250 517.5 L 274 517.5" class="connection-line" stroke="#A855F7" marker-end="url(#arrow-purple)" />

  <!-- ==================== NODES ==================== -->

  <!-- HOME PAGE NODE -->
  <g transform="translate(500, 50)" filter="url(#shadow)">
    <rect width="200" height="70" rx="12" fill="url(#home-grad)" stroke="#60A5FA" stroke-width="2" />
    <text x="100" y="32" class="label" font-size="15" fill="#FFFFFF" text-anchor="middle">Home Page</text>
    <text x="100" y="52" class="home-url" text-anchor="middle">pages/index.html</text>
  </g>

  <!-- COLUMN 1: ABOUT US -->
  <g transform="translate(50, 220)" filter="url(#shadow)">
    <rect width="180" height="60" rx="8" fill="url(#node-grad)" stroke="#3B82F6" class="node-rect" />
    <rect width="6" height="60" rx="2" fill="#3B82F6" />
    <text x="20" y="28" class="label" fill="#FFFFFF">About Us</text>
    <text x="20" y="46" class="url">about.html</text>
  </g>

  <!-- COLUMN 2: SERVICES DROPDOWN -->
  <g transform="translate(280, 220)" filter="url(#shadow)">
    <rect width="180" height="60" rx="8" fill="url(#node-grad)" stroke="#A855F7" class="node-rect" />
    <rect width="6" height="60" rx="2" fill="#A855F7" />
    <text x="20" y="28" class="label" fill="#FFFFFF">Services Menu</text>
    <text x="20" y="46" class="url">Dropdown Category</text>
    <path d="M 150 24 L 155 30 L 160 24 Z" fill="#A855F7" />
  </g>

  <!-- COLUMN 2 SUB 1: CANADA IMMIGRATION -->
  <g transform="translate(280, 330)" filter="url(#shadow)">
    <rect width="180" height="55" rx="6" fill="url(#node-grad)" stroke="#C084FC" stroke-opacity="0.8" class="node-rect" />
    <rect width="4" height="55" rx="1.5" fill="#C084FC" />
    <text x="15" y="26" class="label" font-size="12" fill="#F3F4F6">Canada Immigration</text>
    <text x="15" y="42" class="url">canada.html</text>
  </g>

  <!-- COLUMN 2 SUB 2: OTHER COUNTRIES -->
  <g transform="translate(280, 410)" filter="url(#shadow)">
    <rect width="180" height="55" rx="6" fill="url(#node-grad)" stroke="#C084FC" stroke-opacity="0.8" class="node-rect" />
    <rect width="4" height="55" rx="1.5" fill="#C084FC" />
    <text x="15" y="26" class="label" font-size="12" fill="#F3F4F6">Other Countries</text>
    <text x="15" y="42" class="url">other-countries.html</text>
  </g>

  <!-- COLUMN 2 SUB 3: LEGAL SERVICES -->
  <g transform="translate(280, 490)" filter="url(#shadow)">
    <rect width="180" height="55" rx="6" fill="url(#node-grad)" stroke="#C084FC" stroke-opacity="0.8" class="node-rect" />
    <rect width="4" height="55" rx="1.5" fill="#C084FC" />
    <text x="15" y="26" class="label" font-size="12" fill="#F3F4F6">Legal Services</text>
    <text x="15" y="42" class="url">legal.html</text>
  </g>

  <!-- COLUMN 3: CONSULTATION BOOKING -->
  <g transform="translate(510, 220)" filter="url(#shadow)">
    <rect width="180" height="60" rx="8" fill="url(#node-grad)" stroke="#14B8A6" class="node-rect" />
    <rect width="6" height="60" rx="2" fill="#14B8A6" />
    <text x="20" y="28" class="label" fill="#FFFFFF">Consultation Booking</text>
    <text x="20" y="46" class="url">consultation.html</text>
  </g>

  <!-- COLUMN 4: CAREER -->
  <g transform="translate(740, 220)" filter="url(#shadow)">
    <rect width="180" height="60" rx="8" fill="url(#node-grad)" stroke="#10B981" class="node-rect" />
    <rect width="6" height="60" rx="2" fill="#10B981" />
    <text x="20" y="28" class="label" fill="#FFFFFF">Career</text>
    <text x="20" y="46" class="url">career.html</text>
  </g>

  <!-- COLUMN 5: CONTACT -->
  <g transform="translate(970, 220)" filter="url(#shadow)">
    <rect width="180" height="60" rx="8" fill="url(#node-grad)" stroke="#F59E0B" class="node-rect" />
    <rect width="6" height="60" rx="2" fill="#F59E0B" />
    <text x="20" y="28" class="label" fill="#FFFFFF">Contact</text>
    <text x="20" y="46" class="url">contact.html</text>
  </g>
</svg>
