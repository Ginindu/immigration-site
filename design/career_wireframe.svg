<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1800" width="1440" height="1800" style="background:#F9FAFB;">
  

  <!-- HEADER -->
  <g id="Header">
    <rect x="0" y="0" width="1440" height="90" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="100" y="52" font-size="24">Apex-Trust-Ardent</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="520" y="51" font-size="15">Home</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="585" y="51" font-size="15">About</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="650" y="51" font-size="15">Services [Dropdown]</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="815" y="51" font-size="15">Consultation</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="925" y="51" font-size="15" font-weight="600">Career</text>
    <line x1="925" y1="62" x2="975" y2="62" stroke="#6B7280" stroke-width="2" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="995" y="51" font-size="15">Contact</text>
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="1080" y="27" width="36" height="36" rx="18" />
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="1130" y="27" width="36" height="36" rx="6" />
    <rect fill="#9CA3AF" rx="20" x="1180" y="25" width="160" height="40" rx="20" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="1225" y="49" font-size="14">Get A Quote</text>
  </g>

  <!-- PAGE HEADER BANNER -->
  <g id="Page-Header">
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="0" y="90" width="1440" height="250" />
    <line x1="0" y1="90" x2="1440" y2="340" stroke="#D1D5DB" stroke-width="1" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="720" y="210" font-size="36" text-anchor="middle" fill="#1F2937">Careers</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="720" y="250" font-size="14" text-anchor="middle">Home / Careers</text>
  </g>

  <!-- OPEN ROLES -->
  <g id="Open-Roles">
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="100" y="390" font-size="24">Current Openings</text>
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="100" y="420" font-size="15">Browse our open positions and submit your application below.</text>

    <!-- Role 1 -->
    <g name="Role Card 1">
      <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="100" y="450" width="390" height="320" />
      <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="130" y="480" width="80" height="24" rx="4" />
      <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="170" y="496" font-size="11" text-anchor="middle" font-weight="bold">Full-Time</text>
      <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="130" y="540" font-size="20">Immigration Counsellor</text>
      <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="130" y="580" font-size="13">Provide expert consultation on Canadian Express</text>
      <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="130" y="600" font-size="13">Entry and Study Permit eligibility pathways.</text>
      <rect fill="#9CA3AF" rx="20" x="130" y="700" width="140" height="38" rx="19" />
      <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="170" y="724" font-size="13">Apply Now</text>
    </g>

    <!-- Role 2 -->
    <g name="Role Card 2">
      <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="525" y="450" width="390" height="320" />
      <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="555" y="480" width="80" height="24" rx="4" />
      <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="595" y="496" font-size="11" text-anchor="middle" font-weight="bold">Full-Time</text>
      <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="555" y="540" font-size="20">Legal Associate</text>
      <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="555" y="580" font-size="13">Assist in drafting administrative reviews, visa</text>
      <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="555" y="600" font-size="13">appeals, and legal briefs updates.</text>
      <rect fill="#9CA3AF" rx="20" x="555" y="700" width="140" height="38" rx="19" />
      <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="595" y="724" font-size="13">Apply Now</text>
    </g>

    <!-- Role 3 -->
    <g name="Role Card 3">
      <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="950" y="450" width="390" height="320" />
      <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="980" y="480" width="80" height="24" rx="4" />
      <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="1020" y="496" font-size="11" text-anchor="middle" font-weight="bold">Full-Time</text>
      <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="980" y="540" font-size="20">Client Services Officer</text>
      <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="980" y="580" font-size="13">Serve as front desk coordinator, handling client</text>
      <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="980" y="600" font-size="13">scheduling and general inquiries.</text>
      <rect fill="#9CA3AF" rx="20" x="980" y="700" width="140" height="38" rx="19" />
      <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="1020" y="724" font-size="13">Apply Now</text>
    </g>
  </g>

  <!-- APPLICATION FORM -->
  <g id="Application-Form">
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="100" y="830" font-size="24">Submit Your Application</text>
    <rect fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5" rx="8" x="100" y="860" width="1240" height="600" />
    
    <!-- Input Fields -->
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="140" y="900" width="560" height="45" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="160" y="927" font-size="14">Full name</text>

    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="740" y="900" width="560" height="45" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="760" y="927" font-size="14">Email Address</text>

    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="140" y="970" width="1160" height="45" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="160" y="997" font-size="14">Position applied for</text>

    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="140" y="1040" width="1160" height="150" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="160" y="1067" font-size="14">Cover letter details...</text>

    <!-- Upload Field -->
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="700" fill="#374151" x="140" y="1225" font-size="15">Upload CV</text>
    <rect fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1.5" x="140" y="1240" width="1160" height="50" rx="6" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="160" y="1270" font-size="13">Select CV document (.pdf, .doc, .docx)</text>

    <rect fill="#9CA3AF" rx="20" x="140" y="1320" width="220" height="48" rx="24" fill="#3B82F6" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="250" y="1349" font-size="14" text-anchor="middle">Submit Application</text>
  </g>

  <!-- FOOTER -->
  <g id="Footer">
    <rect x="0" y="1580" width="1440" height="220" fill="#374151" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="100" y="1630" font-size="18">Your global journey starts here.</text>
    <line x1="100" y1="1660" x2="1340" y2="1660" stroke="#4B5563" stroke-width="1" />
    <text font-family="system-ui, -apple-system, sans-serif" fill="#6B7280" x="100" y="1710" font-size="13" fill="#9CA3AF">© 2026 Apex-Trust-Ardent Immigration. All rights reserved.</text>
    <rect fill="#9CA3AF" rx="20" x="1230" y="1600" width="45" height="45" rx="5" fill="#4B5563" />
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="600" fill="#FFFFFF" x="1248" y="1627" font-size="12">T</text>
    <rect fill="#9CA3AF" rx="20" x="1295" y="1600" width="45" height="45" rx="5" fill="#6B7280" />
    <path d="M1310 1628 l7 -7 l7 7" stroke="#FFFFFF" stroke-width="3" fill="none" />
  </g>
</svg>

